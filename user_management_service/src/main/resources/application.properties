spring.application.name=finance-dashboard
server.port=8080


spring.datasource.url=jdbc:mysql://localhost:3306/finance_dashboard_db
spring.datasource.username=root
spring.datasource.password=password

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#spring.security.user.name=admin
#spring.security.user.password=admin123
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# need to move jwt.secret to env variable in prod
jwt.secret=this_is_a_very_long_secret_key_for_jwt_authentication_123456
jwt.expiration-ms=86400000

#swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html 
